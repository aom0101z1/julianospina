<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reunión Masiva Virtual - Durguez & Julián Ospina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .images-container {
            width: 100%;
            max-width: 720px;
        }
        .images-container img {
            width: 100%;
            display: block;
        }
        .redirect-notice {
            color: #fff;
            text-align: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            font-size: 1.1rem;
        }
        .redirect-notice a {
            color: #c9a227;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="images-container">
        <img src="evento-info-1.jpg" alt="Reunión Masiva Virtual - Martes 03 de Marzo">
        <img src="evento-info-2.jpg" alt="Instructivo Reunión Masiva Virtual">
    </div>
    <div class="redirect-notice" id="redirectNotice" style="display:none;">
        Redirigiendo al evento... <br>
        Si no eres redirigido, <a id="manualLink" href="#">haz clic aquí</a>.
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyB_2VfUKH4dOkQ5fTqYy8hixUE9qN3amYY",
            authDomain: "durguez-registro.firebaseapp.com",
            projectId: "durguez-registro",
            storageBucket: "durguez-registro.firebasestorage.app",
            messagingSenderId: "1074589358816",
            appId: "1:1074589358816:web:a56e1318dee9d8dee10e85"
        };

        // Prevent infinite redirect loops
        const MAX_REDIRECTS_KEY = 'evento_redirect_count';
        const redirectCount = parseInt(sessionStorage.getItem(MAX_REDIRECTS_KEY) || '0');
        if (redirectCount > 2) {
            console.warn('Too many redirects, stopping.');
            sessionStorage.removeItem(MAX_REDIRECTS_KEY);
        } else {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            try {
                const docSnap = await getDoc(doc(db, 'settings', 'meetingConfig'));
                if (docSnap.exists()) {
                    let eventUrl = docSnap.data().eventUrl;
                    // Only redirect if URL is external (not this page)
                    if (eventUrl && !eventUrl.includes('evento') && !eventUrl.includes('julianospina.com.co')) {
                        if (!eventUrl.startsWith('http')) {
                            eventUrl = 'https://' + eventUrl;
                        }
                        sessionStorage.setItem(MAX_REDIRECTS_KEY, String(redirectCount + 1));
                        const notice = document.getElementById('redirectNotice');
                        const link = document.getElementById('manualLink');
                        link.href = eventUrl;
                        notice.style.display = 'block';
                        setTimeout(() => { window.location.href = eventUrl; }, 1500);
                    }
                }
            } catch (e) {
                console.warn('Could not load event URL:', e);
            }
        }
    </script>
</body>
</html>
